<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Releasability Board - Weekly Schedule</title>

    <!-- Favicon (inline SVG) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='0.9em' font-size='90'%3E📊%3C/text%3E%3C/svg%3E">

    <!-- Base Stylesheets -->
    <link rel="stylesheet" href="src/styles/variables.css">
    <link rel="stylesheet" href="src/styles/base.css">
    <link rel="stylesheet" href="src/styles/buttons.css">

    <!-- Releasability-Specific Stylesheet (includes all needed styles) -->
    <link rel="stylesheet" href="src/styles/releasability.css?v=20251111-3">
</head>
<body>
    <div id="releasability-app">
        <!-- Status Legend -->
        <div class="status-legend">
            <div class="legend-left">
                <span class="legend-title">Status:</span>
                <div class="legend-item">
                    <span class="status-indicator status-complete"></span>
                    <span class="legend-label">Complete</span>
                </div>
                <div class="legend-item">
                    <span class="status-indicator status-in-progress"></span>
                    <span class="legend-label">In Progress</span>
                </div>
                <div class="legend-item">
                    <span class="status-indicator status-incomplete"></span>
                    <span class="legend-label">Incomplete</span>
                </div>
            </div>
            <div class="legend-right">
                <label class="hide-completed-label">
                    <input type="checkbox" id="hide-completed-toggle" />
                    Hide Completed Projects
                </label>
                <button id="add-week-btn" class="add-week-btn">+ Add Week</button>
                <button id="refresh-btn" class="icon-btn" aria-label="Refresh Data" style="margin-left: 10px;">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
                    </svg>
                </button>
                <button id="fullscreen-btn" class="icon-btn" aria-label="Toggle Fullscreen" style="margin-left: 10px;">
                    <svg id="fullscreen-icon-expand" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                    </svg>
                    <svg id="fullscreen-icon-compress" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                        <path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 0 2-2h3M3 16h3a2 2 0 0 0 2-2v-3"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Main Grid Container -->
        <div class="grid-wrapper">
            <div id="releasability-grid-container" class="grid-container">
                <!-- Grid will be dynamically rendered here -->
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Loading releasability data...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Application Script -->
    <script type="module" src="src/pages/releasability/releasability-page.js?v=20251118-3"></script>
</body>
</html>
